<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CyberShield X</title>
  <link rel="icon" type="image/png" href="logo.png" sizes="any" />
  <meta name="title" content="CyberShield X" />
  <meta name="description" content="Elite AI-powered phishing detection and forensic threat intelligence." />
  <meta name="keywords" content="cybersecurity, AI, phishing, forensics" />
  <meta name="author" content="CyberShield X Global" />

  <!-- PWA & Apple Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/logo192.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700;900&family=Outfit:wght@100;300;400;600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #020617;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    #root:not(:empty) + #loader-container {
      display: none;
    }
    #loader-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      z-index: 9999;
    }
    .loader-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      animation: pulse 1.5s infinite ease-in-out;
      filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .loading-text {
      color: #3b82f6;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <div id="loader-container">
    <div class="loader-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5L15 20V45C15 67.5 50 95 50 95C50 95 85 67.5 85 45V20L50 5Z" stroke="#3b82f6" stroke-width="4" />
        <path d="M30 40H40V50H30V40ZM60 40H70V50H60V40ZM45 60H55V70H45V60Z" fill="#3b82f6" fill-opacity="0.2" />
        <path d="M35 35L65 65M65 35L35 65" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" />
        <path d="M35 35L65 65M65 35L35 65" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
    <div class="loading-text">Neural Core Initializing</div>
  </div>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
